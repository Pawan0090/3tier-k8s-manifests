apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend-rollout
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    canary: 
      steps:
      - setWeight: {{ .Values.backend.canaryWeight }} # Directs 20% of traffic to the new version
      - pause: { duration: 1m }                    # Pause for 1 minute for manual/automated validation
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        # Connecting your Node.js Backend to your AWS RDS MariaDB Instance
        - name: DB_HOST
          value: "database-2.czg0w2wog5cb.ap-south-1.rds.amazonaws.com" # Replace with your real RDS Endpoint String
        - name: DB_USER
          value: "test-eks"                                # Your MariaDB Master Username
        - name: DB_PASSWORD
          value: "test@123"                   # Hardcoded for now (Secrets Manager implementation comes in Phase 3)
        - name: DB_NAME
          value: "employeedb"